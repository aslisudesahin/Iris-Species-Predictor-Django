<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Template - Iris Project</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

    <nav>
        <div class="logo" style="display: flex; align-items: center;">
            <img src="{% static 'logo.jpg' %}" style="height: 50px; margin-right: 10px;">
            <span style="font-size: 1.8rem; font-weight: bold; color: white; letter-spacing: 1px;">IrisAI</span>
        </div>
        <ul>
            <li><a href="{% url 'list_view' %}">List</a></li>
            <li><a href="{% url 'add_view' %}">Add Data</a></li>
            <li><a href="{% url 'search_view' %}">Search</a></li>
            <li><a href="{% url 'predict_view' %}">🤖 AI Prediction</a></li>
            <li><a href="{% url 'logout' %}" style="color: #e74c3c; border: 1px solid #e74c3c; padding: 5px 10px; border-radius: 4px;">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <div style="text-align: center; padding: 50px; color: #888;">
            <h2>🛠️ Base Template</h2>
            <p>This is the skeleton of the website.</p>
            <p>Other pages (List, Search, etc.) are loaded between this menu and the footer.</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Iris Data Project </p>
    </footer>

</body>
</html>
